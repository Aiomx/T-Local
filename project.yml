name: EnterpriseTelemetryLocationQA
options:
  bundleIdPrefix: com.enterprise.telemetryqa
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
targets:
  TelemetryLocationKit_iOS:
    type: framework
    platform: iOS
    productName: TelemetryLocationKit
    sources:
      - Sources/TelemetryLocationKit
    info:
      path: Generated/TelemetryLocationKit-iOS-Info.plist
      properties:
        CFBundleDisplayName: TelemetryLocationKit
        CFBundlePackageType: FMWK
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    settings:
      base:
        PRODUCT_MODULE_NAME: TelemetryLocationKit
        PRODUCT_NAME: TelemetryLocationKit
        PRODUCT_BUNDLE_IDENTIFIER: com.enterprise.telemetryqa.locationkit.ios
  TelemetryLocationKit_macOS:
    type: framework
    platform: macOS
    productName: TelemetryLocationKit
    sources:
      - Sources/TelemetryLocationKit
    info:
      path: Generated/TelemetryLocationKit-macOS-Info.plist
      properties:
        CFBundleDisplayName: TelemetryLocationKit
        CFBundlePackageType: FMWK
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    settings:
      base:
        PRODUCT_MODULE_NAME: TelemetryLocationKit
        PRODUCT_NAME: TelemetryLocationKit
        PRODUCT_BUNDLE_IDENTIFIER: com.enterprise.telemetryqa.locationkit.macos
  TelemetryQAConsole:
    type: application
    platform: iOS
    sources:
      - Sources/TelemetryQAConsole
    dependencies:
      - target: TelemetryLocationKit_iOS
    info:
      path: Generated/TelemetryQAConsole-Info.plist
      properties:
        CFBundleDisplayName: Telemetry QA Console
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        NSLocationWhenInUseUsageDescription: "Used by QA engineers to preview internal telemetry location scenarios."
    entitlements:
      path: Config/TelemetryQAConsole.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enterprise.telemetryqa.console
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
  TelemetryScenarioStudio:
    type: application
    platform: macOS
    sources:
      - Sources/TelemetryScenarioStudio
    dependencies:
      - target: TelemetryLocationKit_macOS
    info:
      path: Generated/TelemetryScenarioStudio-Info.plist
      properties:
        CFBundleDisplayName: Telemetry Scenario Studio
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
    entitlements:
      path: Config/TelemetryScenarioStudio.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enterprise.telemetryqa.studio
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
  TelemetryLocationKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/TelemetryLocationKitTests
    dependencies:
      - target: TelemetryLocationKit_macOS
    settings:
      base:
        PRODUCT_MODULE_NAME: TelemetryLocationKitTests
        PRODUCT_BUNDLE_IDENTIFIER: com.enterprise.telemetryqa.locationkit.tests
schemes:
  TelemetryQAConsole:
    build:
      targets:
        TelemetryQAConsole: all
  TelemetryScenarioStudio:
    build:
      targets:
        TelemetryScenarioStudio: all
    test:
      targets:
        - TelemetryLocationKitTests
  TelemetryLocationKit:
    build:
      targets:
        TelemetryLocationKit_iOS: all
        TelemetryLocationKit_macOS: all
    test:
      targets:
        - TelemetryLocationKitTests
